name: Run Dashboard Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clean install dependencies
      run: |
        cd dashboard
        rm -rf node_modules package-lock.json
        npm install

    - name: Run tests
      run: |
        cd dashboard
        npm run test -- --run