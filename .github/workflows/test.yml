name: Run Dashboard Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'dashboard/package-lock.json'

    - name: Install dependencies
      run: |
        cd dashboard
        npm ci

    - name: Run tests
      run: |
        cd dashboard
        npm run test